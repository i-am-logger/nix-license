name: Deploy Demo Reports to GitHub Pages
on:
  release:
    types: [published]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17
        with:
          extra-conf: |
            extra-substituters = https://nix-community.cachix.org https://cache.nixos.org
            extra-trusted-public-keys = nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
      - name: Personal report
        uses: ./action
        with:
          target: .#demo-reports.x86_64-linux.personal
          artifact-name: report-personal
          fail-on-blocked: 'false'
          pages-path: pages/personal
      - name: SaaS report
        uses: ./action
        with:
          target: .#demo-reports.x86_64-linux.saas
          artifact-name: report-saas
          fail-on-blocked: 'false'
          pages-path: pages/saas
      - name: Proprietary report
        uses: ./action
        with:
          target: .#demo-reports.x86_64-linux.proprietary
          artifact-name: report-proprietary
          fail-on-blocked: 'false'
          pages-path: pages/proprietary
      - name: Pages index
        run: |
          cat > pages/index.html << 'EOF'
          <!DOCTYPE html>
          <html><head><meta charset="utf-8"><title>nix-license demo reports</title>
          <style>body{font-family:sans-serif;background:#0d1117;color:#c9d1d9;padding:2rem;max-width:600px;margin:0 auto}
          a{color:#58a6ff;text-decoration:none;font-size:1.2rem}a:hover{text-decoration:underline}
          li{margin:1rem 0}h1{margin-bottom:2rem}</style></head>
          <body><h1>nix-license demo reports</h1><ul>
          <li><a href="personal/index.html">Personal — FOSS-only with NVIDIA exception</a></li>
          <li><a href="saas/index.html">SaaS — Docker containers</a></li>
          <li><a href="proprietary/index.html">Proprietary — commercial product</a></li>
          </ul></body></html>
          EOF
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
