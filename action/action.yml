name: 'nix-license report'
description: 'Generate a license compliance report for a NixOS system'
inputs:
  system:
    description: 'NixOS system configuration name (e.g., myhost)'
    required: false
  target:
    description: 'Custom nix build target (overrides system). Example: .#demo-reports.x86_64-linux.personal'
    required: false
  flake:
    description: 'Path to flake (default: current directory)'
    required: false
    default: '.'
  upload-artifact:
    description: 'Upload report as a GitHub artifact'
    required: false
    default: 'true'
  artifact-name:
    description: 'Name for the uploaded artifact'
    required: false
    default: 'nix-license-report'
  fail-on-blocked:
    description: 'Fail the build if any packages are blocked'
    required: false
    default: 'true'
  pages-path:
    description: 'Path to assemble pages output (for GitHub Pages deployment). If set, copies report to this directory.'
    required: false
outputs:
  report-path:
    description: 'Path to the generated report directory'
    value: ${{ steps.report.outputs.path }}
  total:
    description: 'Total number of packages evaluated'
    value: ${{ steps.summary.outputs.total }}
  allowed:
    description: 'Number of allowed packages'
    value: ${{ steps.summary.outputs.allowed }}
  blocked:
    description: 'Number of blocked packages'
    value: ${{ steps.summary.outputs.blocked }}
runs:
  using: 'composite'
  steps:
    - name: Build license report
      id: report
      shell: bash
      run: |
        if [ -n "${{ inputs.target }}" ]; then
          BUILD_TARGET="${{ inputs.target }}"
        else
          BUILD_TARGET="${{ inputs.flake }}#nixosConfigurations.${{ inputs.system }}.config.nix-license.report"
        fi
        nix build "$BUILD_TARGET" --print-build-logs
        echo "path=$(readlink -f result)" >> "$GITHUB_OUTPUT"
    - name: Parse summary
      id: summary
      shell: bash
      run: |
        echo "total=$(nix run nixpkgs#jq -- -r '.summary.total' result/report.json)" >> "$GITHUB_OUTPUT"
        echo "allowed=$(nix run nixpkgs#jq -- -r '.summary.allowed' result/report.json)" >> "$GITHUB_OUTPUT"
        echo "blocked=$(nix run nixpkgs#jq -- -r '.summary.blocked' result/report.json)" >> "$GITHUB_OUTPUT"
        echo "overridden=$(nix run nixpkgs#jq -- -r '.summary.overridden' result/report.json)" >> "$GITHUB_OUTPUT"
    - name: Print summary
      shell: bash
      run: |
        BLOCKED=${{ steps.summary.outputs.blocked }}
        TOTAL=${{ steps.summary.outputs.total }}
        ALLOWED=${{ steps.summary.outputs.allowed }}
        OVERRIDDEN=${{ steps.summary.outputs.overridden }}

        if [ "$BLOCKED" -gt 0 ]; then
          echo "## ✗ FAIL — ${{ inputs.artifact-name }}" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "## ✓ PASS — ${{ inputs.artifact-name }}" >> "$GITHUB_STEP_SUMMARY"
        fi
        echo "" >> "$GITHUB_STEP_SUMMARY"

        # Usage
        echo "**Usage:**" >> "$GITHUB_STEP_SUMMARY"
        nix run nixpkgs#jq -- -r '.usage | to_entries | map("**\(.key):** \(.value)") | join(" · ")' result/report.json >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"

        # Summary line
        echo "✓ **$ALLOWED** allowed · ✗ **$BLOCKED** blocked · ⚑ **$OVERRIDDEN** overridden · **$TOTAL** total" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"

        # Blocked packages (if any)
        if [ "$BLOCKED" -gt 0 ]; then
          echo "### Blocked" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | Version | License | Reason |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|---------|---------|--------|" >> "$GITHUB_STEP_SUMMARY"
          nix run nixpkgs#jq -- -r '.packages[] | select(.status == "blocked") | "| \(.pname) | \(.version) | \(.licenses | map(.name) | join(", ")) | \(.conflicts | map(.reason) | join("; ")) |"' result/report.json >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
        fi

        # All packages (collapsible)
        echo "<details><summary>All packages ($TOTAL)</summary>" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "| | Package | Version | License | Details |" >> "$GITHUB_STEP_SUMMARY"
        echo "|---|---------|---------|---------|---------|" >> "$GITHUB_STEP_SUMMARY"
        nix run nixpkgs#jq -- -r '.packages | sort_by(.status == "allowed") | .[] | "| \(if .status == "allowed" then "✓" elif .status == "blocked" then "✗" elif .status == "overridden" then "⚑" else "?" end) | \(.pname) | \(.version) | \(.licenses | map(.name) | join(", ")) | \(if (.conflicts | length) > 0 then (.conflicts | map(.reason) | join("; ")) elif (.obligations | length) > 0 then (.obligations | map(.obligation) | join(", ")) else "-" end) |"' result/report.json >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "</details>" >> "$GITHUB_STEP_SUMMARY"
    - name: Upload report artifact
      if: inputs.upload-artifact == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: result
    - name: Copy to pages
      if: inputs.pages-path != ''
      shell: bash
      run: |
        mkdir -p "${{ inputs.pages-path }}"
        cp -rL result/* "${{ inputs.pages-path }}/"
    - name: Check for blocked packages
      if: inputs.fail-on-blocked == 'true'
      shell: bash
      run: |
        BLOCKED=${{ steps.summary.outputs.blocked }}
        if [ "$BLOCKED" -gt 0 ]; then
          echo "::error::$BLOCKED packages blocked by license compliance"
          nix run nixpkgs#jq -- -r '.packages[] | select(.status == "blocked") | "\(.pname): \(.conflicts[0].reason // "unknown")"' result/report.json
          exit 1
        fi
