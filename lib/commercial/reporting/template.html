<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>nix-license — __REPORT_TITLE__</title>
  <style>
    :root { --bg: #0d1117; --fg: #c9d1d9; --border: #30363d; --green: #3fb950; --red: #f85149; --yellow: #d29922; --blue: #58a6ff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--fg); padding: 2rem; max-width: 1200px; margin: 0 auto; }
    h1 { margin-bottom: 0.5rem; }
    .subtitle { color: #8b949e; margin-bottom: 2rem; }
    .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .card { background: #161b22; border: 1px solid var(--border); border-radius: 6px; padding: 1.5rem; text-align: center; }
    .card .number { font-size: 2.5rem; font-weight: bold; }
    .card .label { color: #8b949e; margin-top: 0.25rem; }
    .card.allowed .number { color: var(--green); }
    .card.blocked .number { color: var(--red); }
    .card.overridden .number { color: var(--yellow); }
    .card.total .number { color: var(--blue); }
    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
    .header-left h1 { margin-bottom: 0.25rem; }
    .verdict { font-size: 1.5rem; font-weight: bold; padding: 0.5rem 1.5rem; border-radius: 8px; }
    .verdict-pass { background: #1f3d2a; color: var(--green); border: 2px solid var(--green); }
    .verdict-fail { background: #3d1f1f; color: var(--red); border: 2px solid var(--red); }
    .usage { background: #161b22; border: 1px solid var(--border); border-radius: 6px; padding: 1.5rem; margin-bottom: 2rem; }
    .usage h2 { margin-bottom: 0.75rem; }
    .usage-grid { display: flex; flex-wrap: wrap; gap: 1.5rem; }
    .usage-item { display: flex; flex-direction: column; align-items: center; gap: 0.3rem; }
    .usage-key { color: #8b949e; font-size: 1rem; }
    .badge { display: inline-block; padding: 0.25rem 0.6rem; border-radius: 12px; font-size: 0.8rem; font-weight: 600; }
    .badge-true { background: #1f3d2a; color: var(--green); }
    .badge-false { background: #3d1f1f; color: var(--red); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.75rem; border-bottom: 1px solid var(--border); }
    th { color: #8b949e; font-weight: 600; }
    tr:hover { background: #161b22; }
    .status { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
    .status-allowed { background: #1f3d2a; color: var(--green); }
    .status-blocked { background: #3d1f1f; color: var(--red); }
    .status-overridden { background: #3d2f1f; color: var(--yellow); }
    .status-no-license { background: #1f2d3d; color: #8b949e; }
    .filter-bar { margin-bottom: 1rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .filter-btn { background: #161b22; border: 1px solid var(--border); color: var(--fg); padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .filter-btn.active { border-color: var(--blue); color: var(--blue); }
    input[type=search] { background: #161b22; border: 1px solid var(--border); color: var(--fg); padding: 0.4rem 0.8rem; border-radius: 6px; font-size: 0.85rem; width: 250px; }
    footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); color: #8b949e; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <h2 style="margin-bottom:0.25rem">Nix-License Report</h2>
      <h1 id="headerTitle"></h1>
      <p class="subtitle" id="headerSubtitle"></p>
    </div>
    <div style="text-align:right">
      <div id="verdict"></div>
      <p class="subtitle" id="headerDate" style="margin-top:0.5rem"></p>
    </div>
  </div>
  <div id="app"></div>
  <footer id="footer"></footer>
  <script>
    const report = __REPORT_JSON__;
    const app = document.getElementById('app');
    const verdict = document.getElementById('verdict');
    const meta = report.meta || {};
    const ts = meta.generatedAt && meta.generatedAt > 0 ? new Date(meta.generatedAt * 1000).toISOString().replace('T', ' ').replace(/\.\d+Z/, ' UTC') : null;
    const name = (meta.title || '').split(' — ')[0] || 'License Compliance Report';
    const desc = (meta.title || '').split(' — ').slice(1).join(' — ');
    document.getElementById('headerTitle').textContent = name;
    document.getElementById('headerSubtitle').textContent = desc;
    document.getElementById('headerDate').textContent = ts || new Date().toISOString().replace('T', ' ').replace(/\.\d+Z/, ' UTC');
    const isCompliant = report.summary.blocked === 0;
    verdict.className = 'verdict ' + (isCompliant ? 'verdict-pass' : 'verdict-fail');
    verdict.innerHTML = isCompliant ? '<span style="color:var(--green)">\u2714</span> PASS' : '<span style="color:var(--red)">\u2718</span> FAIL';
    const statusIcon = { allowed: '\u2714', blocked: '\u2718', overridden: '\u2691', 'no-license': '?' };
    const usageBadge = (v) => typeof v === 'boolean'
      ? (v ? '<span class="badge badge-true">\u2714</span>' : '<span class="badge badge-false">\u2718</span>')
      : `<span class="badge badge-true">${v}</span>`;
    app.innerHTML = `
      <div class="summary">
        <div class="card total"><div class="number">${report.summary.total}</div><div class="label">Total</div></div>
        <div class="card allowed"><div class="number">${report.summary.allowed}</div><div class="label">Allowed</div></div>
        <div class="card blocked"><div class="number">${report.summary.blocked}</div><div class="label">Blocked</div></div>
        <div class="card overridden"><div class="number">${report.summary.overridden}</div><div class="label">Overridden</div></div>
      </div>
      <div class="usage">
        <h2>Usage: <span style="color:var(--blue);text-transform:capitalize">${report.usage.type}</span></h2>
        <div class="usage-grid">
          ${Object.entries(report.usage).filter(([k]) => k !== 'type').map(([k,v]) => `<div class="usage-item"><span class="usage-key">${k}</span>${usageBadge(v)}</div>`).join('')}
        </div>
      </div>
      <div class="filter-bar">
        <input type="search" id="search" placeholder="Search packages...">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="blocked">Blocked</button>
        <button class="filter-btn" data-filter="allowed">Allowed</button>
        <button class="filter-btn" data-filter="overridden">Overridden</button>
      </div>
      <table><thead><tr><th>Package</th><th>Version</th><th>Hash</th><th>License</th><th>Status</th><th>Details</th></tr></thead>
      <tbody id="pkgTable"></tbody></table>`;
    function renderTable(filter, search) {
      const tbody = document.getElementById('pkgTable');
      const filtered = report.packages
        .filter(p => filter === 'all' || p.status === filter)
        .filter(p => !search || p.pname.toLowerCase().includes(search.toLowerCase()));
      tbody.innerHTML = filtered.map(p =>
        `<tr><td>${p.pname}</td><td>${p.version}</td>
        <td><code style="color:#8b949e;font-size:0.8rem">${(p.outputHash || '').substring(0,7)}</code></td>
        <td>${p.licenses.map(l => l.name).join(', ')}</td>
        <td><span class="status status-${p.status}">${statusIcon[p.status] || p.status}</span></td>
        <td>${p.conflicts.length ? p.conflicts.map(c => c.reason).join('; ') : p.obligations.length ? p.obligations.map(o => o.obligation).join(', ') : '-'}</td></tr>`
      ).join('');
    }
    let currentFilter = 'all';
    renderTable(currentFilter, '');
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderTable(currentFilter, document.getElementById('search').value);
      });
    });
    document.getElementById('search').addEventListener('input', (e) => {
      renderTable(currentFilter, e.target.value);
    });

    // Footer with metadata
    document.getElementById('footer').innerHTML = `
      Generated by <a href="https://github.com/i-am-logger/nix-license" style="color:var(--blue)">nix-license</a> v${meta.version || '?'}
      &middot; ${ts || new Date().toISOString().replace('T', ' ').replace(/\.\d+Z/, ' UTC')}
      &middot; ${meta.compliant ? '\u2714 compliant' : '\u2718 non-compliant'}
      <br><code style="font-size:0.8rem;color:#8b949e">sha256:${meta.checksum || 'unknown'}</code>
    `;
  </script>
</body>
</html>
